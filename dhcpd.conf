# =============================================================
# DHCP Server Config for Cisco POAP
# File location: /etc/dhcp/dhcpd.conf
# Server OS: Red Hat Enterprise Linux 8/9
# =============================================================
# After editing this file run:
#   sudo systemctl restart dhcpd
# To test syntax before restarting:
#   sudo dhcpd -t -cf /etc/dhcp/dhcpd.conf
# =============================================================

default-lease-time 3600;
max-lease-time 7200;
authoritative;

subnet 192.168.1.0 netmask 255.255.255.0 {

    # IP pool for POAP switches
    range 192.168.1.10 192.168.1.50;

    # Default gateway
    option routers 192.168.1.100;

    option subnet-mask 255.255.255.0;

    # Option 66 — TFTP Server IP (tells switch where to download script from)
    option tftp-server-name "192.168.1.100";

    # Option 67 — Boot filename (tells switch which file to download and run)
    option bootfile-name "poap_script.py";

    # Next server — same as TFTP server
    next-server 192.168.1.100;

}
